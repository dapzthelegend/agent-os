<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}agentic-os dashboard{% endblock %}</title>
    <link rel="stylesheet" href="{{ request.url_for('static', path='dashboard.css') }}">
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <a class="brand" href="/">agentic-os</a>
          <p class="subtitle">Local operator dashboard</p>
        </div>
        <nav class="nav">
          <a href="/">Overview</a>
          <a href="/tasks">Tasks</a>
          <a href="/approvals">Approvals</a>
          <a href="/audit">Audit</a>
          <a href="/recaps">Recaps</a>
        </nav>
      </header>

      {% if message %}
      <div class="banner banner-success">{{ message }}</div>
      {% endif %}
      {% if error %}
      <div class="banner banner-danger">{{ error }}</div>
      {% endif %}

      <main class="content">
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
